<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Premium App Store</title>
    <style>
        :root {
            --primary: #007aff;
            --success: #34c759;
            --danger: #ff3b30;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --search-bg: #e3e3e6;
            --dialog-bg: #ffffff;
            --dialog-text: #1d1d1f;
            /* নতুন হেডার ব্যাকগ্রাউন্ড ভেরিয়েবল */
            --header-bg: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* ডার্ক মোড সাপোর্ট */
        body.dark-theme {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-sub: #a1a1a6;
            --search-bg: #1c1c1e;
            --header-bg: rgba(0, 0, 0, 0.7);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding-bottom: 30px;
            overflow-x: hidden;
            overscroll-behavior-y: contain;
            transition: background 0.3s ease;
        }

        /* --- Pull to Refresh Style --- */
        #refresh-container {
            width: 100%;
            height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: transparent;
            transition: height 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .refresh-spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #d1d1d6;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            transform: rotate(0deg);
        }

        .refresh-spinner.loading {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* --- Header Section --- */
        .header {
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 0.5px solid #d1d1d6;
        }

        body.dark-theme .header {
            border-bottom: 0.5px solid #333;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 15px;
            transition: color 0.3s;
        }

        .search-container {
            background: var(--search-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            transition: background 0.3s;
        }

        .search-container input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            margin-left: 10px;
            color: var(--text-main);
        }

        /* --- Category Slider --- */
        .category-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px 20px;
            scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }

        .cat-chip {
            background: var(--card-bg);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            color: var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.3s;
        }

        .cat-chip.active {
            background: var(--primary);
            color: white;
        }

        /* --- App Grid --- */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }

        .app-card {
            background: var(--card-bg);
            border-radius: 22px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.3s, background 0.3s;
            position: relative;
            cursor: pointer;
        }

        .app-card:active { transform: scale(0.98); }

        .app-icon {
            width: 75px;
            height: 75px;
            border-radius: 18px;
            object-fit: cover;
            margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            pointer-events: none;
        }

        .app-emoji-icon {
            width: 75px;
            height: 75px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--primary), #5856d6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            margin-bottom: 10px;
            color: white;
            pointer-events: none;
        }

        .app-name {
            font-size: 14px;
            font-weight: 700;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            pointer-events: none;
        }

        .app-meta {
            font-size: 11px;
            color: var(--text-sub);
            margin: 4px 0 10px;
            pointer-events: none;
        }

        .btn-install {
            background: #f0f0f7;
            color: var(--primary);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
        }

        body.dark-theme .btn-install { background: #2c2c2e; }

        .btn-install.downloading {
            background: var(--primary);
            color: white;
        }

        .btn-cancel {
            margin-top: 8px;
            background: #ffebeb;
            color: var(--danger);
            border: none;
            padding: 6px 15px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            width: 90%;
            display: none;
        }

        .progress-box {
            width: 100%;
            height: 4px;
            background: #e5e5ea;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--success);
            transition: 0.3s;
        }

        /* --- Detail Modal --- */
        .detail-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2100;
            padding: 20px;
        }

        .detail-modal-card {
            background: var(--dialog-bg);
            color: var(--dialog-text);
            border-radius: 36px;
            width: 100%;
            max-width: 380px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px 20px;
            text-align: center;
            animation: pop 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            scrollbar-width: none;
        }

        .detail-icon {
            margin: 0 auto 12px;
            width: 90px;
            height: 90px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .screenshot-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            margin: 15px 0;
            scrollbar-width: none;
        }
        
        .screenshot-img {
            width: 140px; height: 250px;
            border-radius: 15px; object-fit: cover; flex-shrink: 0;
            background: #eee; border: 1px solid #eee;
        }

        .detail-description {
            font-size: 14px;
            line-height: 1.5;
            background: rgba(0,0,0,0.03);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: left;
            white-space: pre-wrap;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: var(--dialog-bg);
            color: var(--dialog-text);
            border-radius: 30px;
            width: 100%; max-width: 350px; padding: 30px;
            text-align: center;
        }
        .modal-button-group { display: flex; gap: 12px; margin-top: 8px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 30px; font-weight: 700; border: none; cursor: pointer; }
        .modal-install-btn { background: var(--primary); color: white; }
        .modal-cancel-btn { background: #e9e9ef; color: #1d1d1f; }
        
        .modal-progress-area { margin: 15px 0 10px; display: none; }
        .modal-progress-bar-bg { background: #e5e5ea; border-radius: 12px; height: 6px; overflow: hidden; margin: 12px 0; }
        .modal-progress-fill { width: 0%; height: 100%; background: var(--success); }
        .modal-cancel-download-btn { background: #ffebeb; color: var(--danger); border: none; padding: 10px; border-radius: 30px; font-weight: 600; width: 100%; display: none; cursor: pointer; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 25px; border-radius: 25px; font-size: 14px; z-index: 3000; display: none; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        body.dark-theme #loader { background: #000; }
        .main-spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="loader"><div class="main-spinner"></div></div>

<div id="refresh-container">
    <div class="refresh-spinner" id="refresh-spinner"></div>
</div>

<div class="header">
    <h1 id="storeTitle">AppVault</h1>
    <div class="search-container">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="অ্যাপ সার্চ করুন...">
    </div>
</div>

<div class="category-scroll" id="catSlider">
    <div class="cat-chip active" onclick="filterCat('all')">সব</div>
</div>

<div class="apps-grid" id="appsGrid"></div>

<div class="modal-overlay" id="installModal">
    <div class="modal-content">
        <div id="modalIconBox"></div>
        <h2 id="modalAppName" style="margin: 15px 0 5px;"></h2>
        <p style="color: var(--text-sub); font-size: 14px; margin-bottom: 20px;">ডাউনলোড সম্পন্ন হয়েছে। ফোনে ইনস্টল করতে চান?</p>
        <div style="display: flex; gap: 10px;">
            <button onclick="closeModal()" style="flex:1; padding:12px; border-radius:15px; border:none; background:#eee; font-weight:600;">পরে</button>
            <button id="finalInstallBtn" style="flex:1; padding:12px; border-radius:15px; border:none; background:var(--primary); color:white; font-weight:600;">ইনস্টল</button>
        </div>
    </div>
</div>

<div class="detail-modal-overlay" id="detailModal">
    <div class="detail-modal-card">
        <div id="detailIconArea" class="detail-icon"></div>
        <div class="detail-name" id="detailAppName" style="font-size: 22px; font-weight: 800;"></div>
        <div class="detail-cat-rating" id="detailMeta" style="color: var(--text-sub); font-size: 13px; margin: 5px 0;"></div>
        <div class="screenshot-container" id="screenshotArea"></div>
        <div class="detail-description" id="detailDesc"></div>
        <div id="detailInitialButtons" class="modal-button-group">
            <button id="detailInstallBtn" class="modal-btn modal-install-btn">ইন্সটল</button>
            <button onclick="closeDetailModal()" class="modal-btn modal-cancel-btn">বন্ধ</button>
        </div>
        <div id="detailProgressArea" class="modal-progress-area">
            <div class="modal-progress-bar-bg"><div id="detailProgressFill" class="modal-progress-fill"></div></div>
            <div id="detailPercentText" style="font-weight: bold;">0%</div>
            <button id="detailCancelDownloadBtn" class="modal-cancel-download-btn">ডাউনলোড বাতিল</button>
        </div>
    </div>
</div>

<div id="toast"></div>
<script>
    const SUPABASE_URL = "https://fbywkbxtedszsifcnngz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_bA1U7u3q6eQCUi-d75fbHg_imndsQVS";
    
    let apps = [];
    let activeDownloads = {};
    let modalTriggeredDownloadId = null;
    let currentDetailApp = null;
    
    // --- Pull to Refresh ---
    let startY = 0; let isPulling = false;
    const refreshContainer = document.getElementById('refresh-container');
    const refreshSpinner = document.getElementById('refresh-spinner');

    window.addEventListener('touchstart', (e) => { if (window.scrollY === 0) { startY = e.touches[0].pageY; isPulling = true; } }, { passive: true });
    window.addEventListener('touchmove', (e) => {
        if (!isPulling) return;
        const diff = (e.touches[0].pageY - startY) * 0.4;
        if (diff > 0) {
            refreshContainer.style.height = Math.min(diff, 70) + 'px';
            refreshSpinner.style.transform = `rotate(${diff * 5}deg)`;
        }
    }, { passive: true });

    window.addEventListener('touchend', async () => {
        if (!isPulling) return; isPulling = false;
        if (parseInt(refreshContainer.style.height) >= 60) {
            refreshSpinner.classList.add('loading');
            await applySettings();
            await fetchApps();
            setTimeout(() => { refreshSpinner.classList.remove('loading'); refreshContainer.style.height = '0'; showToast("আপডেট করা হয়েছে"); }, 800);
        } else { refreshContainer.style.height = '0'; }
    });

    async function applySettings() {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/store_settings?id=eq.1`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const s = (await res.json())[0];
            if (s) {
                document.getElementById('storeTitle').innerText = s.store_name;
                document.getElementById('storeTitle').style.color = s.title_text_color;
                document.documentElement.style.setProperty('--primary', s.primary_color);
                document.documentElement.style.setProperty('--search-bg', s.search_bar_bg_color);
                document.documentElement.style.setProperty('--card-bg', s.app_card_bg_color);
                document.documentElement.style.setProperty('--text-main', s.app_name_color);
                document.documentElement.style.setProperty('--dialog-bg', s.dialog_bg_color);
                document.documentElement.style.setProperty('--dialog-text', s.dialog_text_color);
                
                // --- নতুন কালার ইমপ্লিমেন্টেশন ---
                if (s.main_bg_color) {
                    document.documentElement.style.setProperty('--bg', s.main_bg_color);
                }
                if (s.header_bg_color) {
                    document.documentElement.style.setProperty('--header-bg', s.header_bg_color);
                }
                
                if(s.is_dark_mode) document.body.classList.add('dark-theme');
                else document.body.classList.remove('dark-theme');
            }
        } catch (e) { console.log("Settings Error"); }
    }

    async function fetchApps() {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/apps?select=*&is_active=eq.true&order=id.asc`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            apps = await res.json();
            renderApps(apps); renderCategories();
            document.getElementById('loader').style.display = 'none';
        } catch (e) { showToast("সার্ভার সমস্যা!"); document.getElementById('loader').style.display = 'none'; }
    }

    function renderCategories() {
        const cats = ['all', ...new Set(apps.map(a => a.category))];
        document.getElementById('catSlider').innerHTML = cats.map(c => `
            <div class="cat-chip ${c==='all'?'active':''}" onclick="filterCat('${c}', this)">${c==='all'?'সব':c}</div>
        `).join('');
    }

    function renderIconHtml(icon) {
        if(icon && icon.startsWith('http')) return `<img src="${icon}" class="app-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5231/5231019.png'">`;
        return `<div class="app-emoji-icon">${icon || '📦'}</div>`;
    }

    function renderApps(data) {
        document.getElementById('appsGrid').innerHTML = data.map(app => `
            <div class="app-card" onclick="openDetailModalById(${app.id})">
                ${renderIconHtml(app.icon)}
                <div class="app-name">${app.name}</div>
                <div class="app-meta">${app.category} • ⭐${app.rating}</div>
                <button class="btn-install" id="btn-${app.id}" onclick="event.stopPropagation(); handleAction(${app.id})">ইন্সটল</button>
                <button class="btn-cancel" id="cncl-${app.id}" onclick="event.stopPropagation(); cancelDownload(${app.id})">ক্যানসেল</button>
                <div class="progress-box" id="pbox-${app.id}"><div class="progress-bar" id="pbar-${app.id}"></div></div>
            </div>
        `).join('');
    }

    function openDetailModalById(id) { const app = apps.find(a => a.id === id); if (app) openDetailModal(app); }

    function openDetailModal(app) {
        currentDetailApp = app;
        document.getElementById('detailIconArea').innerHTML = renderIconHtml(app.icon);
        document.getElementById('detailAppName').innerText = app.name;
        document.getElementById('detailMeta').innerText = `${app.category} • ⭐${app.rating}`;
        document.getElementById('detailDesc').innerText = app.description || "বিবরণ নেই।";
        const screenshotArea = document.getElementById('screenshotArea');
        screenshotArea.innerHTML = '';
        [app.shot1, app.shot2, app.shot3, app.shot4].forEach(s => { if(s && s.startsWith('http')) screenshotArea.innerHTML += `<img src="${s}" class="screenshot-img">`; });
        resetModalToInitial();
        document.getElementById('detailInstallBtn').onclick = () => startDownload(app, true);
        document.getElementById('detailModal').style.display = 'flex';
    }

    function handleAction(id) { const app = apps.find(a => a.id === id); if(!activeDownloads[id]) startDownload(app, false); }

    function startDownload(app, fromModal) {
    const id = app.id; 
    if(activeDownloads[id]) return; 
    activeDownloads[id] = true;

    // --- সুপাবেসে ইন্সটল কাউন্ট পাঠানোর নতুন কোড ---
    fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_downloads`, {
        method: 'POST',
        headers: { 
            'apikey': SUPABASE_KEY, 
            'Authorization': `Bearer ${SUPABASE_KEY}`, 
            'Content-Type': 'application/json' 
        }
    }).catch(e => console.error("Analytics Error"));
    
        if(fromModal) {
            modalTriggeredDownloadId = id;
            document.getElementById('detailInitialButtons').style.display = 'none';
            document.getElementById('detailProgressArea').style.display = 'block';
            document.getElementById('detailCancelDownloadBtn').style.display = 'block';
            document.getElementById('detailCancelDownloadBtn').onclick = () => cancelDownload(id);
        } else {
            document.getElementById(`btn-${id}`).innerText = "0%";
            document.getElementById(`btn-${id}`).classList.add('downloading');
            document.getElementById(`cncl-${id}`).style.display = 'inline-block';
            document.getElementById(`pbox-${id}`).style.display = 'block';
        }
        if (typeof Android !== 'undefined') Android.downloadFile(app.download_url, app.name + ".apk", id);
        else { window.open(app.download_url); activeDownloads[id] = false; fromModal ? resetModalToInitial() : resetUI(id); }
    }

    function cancelDownload(id) {
        if (typeof Android !== 'undefined') Android.cancelDownload(id);
        activeDownloads[id] = false; resetUI(id);
        if(currentDetailApp && currentDetailApp.id === id) resetModalToInitial();
        showToast("বাতিল করা হয়েছে");
    }

    window.updateProgress = function(appId, percent, status, filePath) {
        const isModal = (modalTriggeredDownloadId === appId);
        if(status === 'downloading') {
            if(isModal) { document.getElementById('detailProgressFill').style.width = percent + "%"; document.getElementById('detailPercentText').innerText = percent + "%"; }
            else { document.getElementById(`btn-${appId}`).innerText = percent + "%"; document.getElementById(`pbar-${appId}`).style.width = percent + "%"; }
        } else if(status === 'complete') {
            activeDownloads[appId] = false; resetUI(appId);
            if(isModal) { closeDetailModal(); modalTriggeredDownloadId = null; }
            showInstallModal(appId, filePath);
        } else if(status === 'error') { activeDownloads[appId] = false; resetUI(appId); if(isModal) resetModalToInitial(); showToast("ব্যর্থ!"); }
    };

    function showInstallModal(id, path) {
        const app = apps.find(a => a.id == id); if(!app) return;
        document.getElementById('modalAppName').innerText = app.name;
        document.getElementById('modalIconBox').innerHTML = renderIconHtml(app.icon);
        document.getElementById('installModal').style.display = 'flex';
        document.getElementById('finalInstallBtn').onclick = () => { if (typeof Android !== 'undefined') Android.installApk(path); closeModal(); };
    }

    function resetUI(id) {
        const btn = document.getElementById(`btn-${id}`); if(btn) { btn.innerText = "ইন্সটল"; btn.classList.remove('downloading'); }
        if(document.getElementById(`cncl-${id}`)) document.getElementById(`cncl-${id}`).style.display = 'none';
        if(document.getElementById(`pbox-${id}`)) document.getElementById(`pbox-${id}`).style.display = 'none';
    }

    function resetModalToInitial() { document.getElementById('detailInitialButtons').style.display = 'flex'; document.getElementById('detailProgressArea').style.display = 'none'; }
    function closeDetailModal() { document.getElementById('detailModal').style.display = 'none'; currentDetailApp = null; }
    function closeModal() { document.getElementById('installModal').style.display = 'none'; }
    function filterCat(cat, el) {
        document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
        if(el) el.classList.add('active');
        renderApps(cat === 'all' ? apps : apps.filter(a => a.category === cat));
    }
    document.getElementById('searchInput').oninput = e => { renderApps(apps.filter(a => a.name.toLowerCase().includes(e.target.value.toLowerCase()))); };
    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
    
    applySettings(); fetchApps();
</script>
</body>
</html>
